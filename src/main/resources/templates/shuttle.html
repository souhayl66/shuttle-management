<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Navette</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Ajouter une Navette</h1>
    <form th:action="@{/shuttle}" method="post" th:object="${shuttle}">
        <div class="form-group">
            <label for="departureCity">Ville de Départ :</label>
            <select id="departureCity" name="departureCity" class="form-control" th:field="*{departureCity}" required>
                <option value="">Sélectionnez une ville</option>
                <option value="Rabat">Rabat</option>
                <option value="Kenitra">Kenitra</option>
            </select>
        </div>
        <div class="form-group">
            <label for="arrivalCity">Ville d'Arrivée :</label>
            <select id="arrivalCity" name="arrivalCity" class="form-control" th:field="*{arrivalCity}" required>
                <option value="">Sélectionnez une ville</option>
                <option value="Rabat">Rabat</option>
                <option value="Kenitra">Kenitra</option>
            </select>
        </div>
        <div class="form-group">
            <label for="departureTime">Heure de Départ :</label>
            <input type="time" id="departureTime" name="departureTime" class="form-control" th:field="*{departureTime}" required>
        </div>
        <div class="form-group">
            <label for="maxSubscribers">Nombre Maximum d'Abonnés :</label>
            <input type="number" id="maxSubscribers" name="maxSubscribers" class="form-control" th:field="*{maxSubscribers}" min="1" max="50" required>
            <small class="form-text text-muted">Veuillez entrer un nombre entre 1 et 50.</small>
        </div>
        <button type="submit" class="btn btn-primary">Ajouter la Navette</button>
    </form>
</div>

<script>

    const departureCitySelect = document.getElementById('departureCity');
    const arrivalCitySelect = document.getElementById('arrivalCity');


    departureCitySelect.addEventListener('change', function() {

        if (departureCitySelect.value === 'Rabat') {
            arrivalCitySelect.value = 'Kenitra';
        }

        else if (departureCitySelect.value === 'Kenitra') {
            arrivalCitySelect.value = 'Rabat';
        }

        else {
            arrivalCitySelect.value = '';
        }
    });


    arrivalCitySelect.addEventListener('change', function() {

        if (arrivalCitySelect.value === 'Rabat') {
            departureCitySelect.value = 'Kenitra';
        }

        else if (arrivalCitySelect.value === 'Kenitra') {
            departureCitySelect.value = 'Rabat';
        }

        else {
            departureCitySelect.value = '';
        }
    });
</script>
</body>
</html>
