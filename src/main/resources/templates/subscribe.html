<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>S'abonner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Choisissez un plan d'abonnement</h1>
    <form th:action="@{/subscribe}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- Options d'abonnement -->
        <div class="form-group">
            <label>Sélectionnez un plan d'abonnement :</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="subscriptionPlan" id="plan1" value="1" checked>
                <label class="form-check-label" for="plan1">
                    1 Mois - 100DH
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="subscriptionPlan" id="plan2" value="3">
                <label class="form-check-label" for="plan2">
                    3 Mois - 250DH
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="subscriptionPlan" id="plan3" value="12">
                <label class="form-check-label" for="plan3">
                    1 An - 900DH
                </label>
            </div>
        </div>

        <!-- Bouton de soumission -->
        <button type="submit" class="btn btn-primary mt-3">S'abonner</button>
    </form>
</div>
</body>
</html>
