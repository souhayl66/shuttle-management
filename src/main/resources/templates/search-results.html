<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Liste de voyage</h1>


    <table class="search-table">
        <thead>
        <tr>
            <th>Ville de depart</th>
            <th>Ville d'arrive</th>
            <th>Heure de depart</th>
            <th>Heure d'arrive</th>
            <th>Nomber de sieges</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="shuttle : ${shuttles}">
            <td th:text="${shuttle.departureCity}"></td>
            <td th:text="${shuttle.arrivalCity}"></td>
            <td th:text="${shuttle.departureTime}"></td>
            <td th:text="${shuttle.arrivalTime}"></td>
            <td th:text="${shuttle.maxSubscribers - shuttle.currentSubscribers}"></td>
        </tr>
        </tbody>
    </table>


    <a th:href="@{/shuttle}" class="btn btn-secondary">Autre voyage</a>
</div>
</body>
</html>
